<script type=module>
  import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

  env.allowLocalModels = false;
  env.backends.onnx.wasm.numThreads = 1;

  export class DocumentEmbeddingController {
    constructor() {
      this.initializeModel();
    }
    async initializeModel() {
      this.pipeline = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
    }
    async generateDocumentEmbedding(text) {
      const input = text.trim();
      if (!input) {
        console.warn('No valid text found in the input.');
        return null;
      }

      const result = await this.pipeline(input, { pooling: 'mean' });
      return result.data;
    }
  }

  const embedder = new DocumentEmbeddingController();

  window.addEventListener('message', async (event) => {
    const { requestId, payload } = event.data;

    if (payload === 'ping') {
      event.source.postMessage({ requestId, data: [] }, window.origin);
      return;
    }

    try {
      const features = await embedder.generateDocumentEmbedding(payload);
      event.source.postMessage({ requestId, data: features ? Array.from(features) : [] }, window.origin);
    } catch (error) {
      const message = error instanceof Error ? error.message : String(error);
      event.source.postMessage({ requestId, data: [], error: message }, window.origin);
    }
  });
</script>
